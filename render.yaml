services:
  - type: web
    name: pitwise-api
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pitwise-db
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        value: https://pitwise.example
      - key: BACKEND_TRUSTED_HOSTS
        value: pitwise-api.onrender.com
      - key: AUTO_CREATE_TABLES
        value: false
      - key: SEED_DATABASE_ON_STARTUP
        value: false
      - key: SEED_DEMO_DATA
        value: false
      - key: SQL_ECHO
        value: false
      - key: AI_MODE
        value: fallback
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: true
      - key: SEED_REFERENCE_DATA_ON_STARTUP
        value: true

databases:
  - name: pitwise-db
    databaseName: pitwise
    user: pitwise
